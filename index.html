<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Arquetipos Emocionales | maestríanimal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#00505b',
                            hover: '#003d46',
                            50: '#e0ecee',
                            100: '#b3d3d7'
                        },
                        whatsapp: {
                            DEFAULT: '#25D366',
                            hover: '#128C7E',
                            bg: '#f0fcf4',
                            border: '#d1f4e0'
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Mantenemos solo estilos muy específicos o para la presentación en el canvas */
        body {
            background-color: #f3f4f6; /* bg-gray-100 */
        }
        
        .shadow-soft {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05), 0 0 3px rgba(0, 0, 0, 0.02);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 font-sans text-gray-800 antialiased">

  <div class="w-full max-w-[420px] bg-white rounded-xl shadow-soft border border-gray-100 overflow-hidden transition-all duration-300 hover:shadow-md">
    
    <!-- Franja superior decorativa (opcional, le da un toque clínico) -->
    <div class="h-1.5 w-full bg-brand"></div>

    <div class="p-8">
      
      <!-- Cabecera de la tarjeta con icono -->
      <div class="flex items-center gap-3 mb-4">
        <div class="flex items-center justify-center w-10 h-10 rounded-full bg-brand-50 text-brand">
          <!-- Icono de portapapeles/test -->
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
        </div>
        <span class="text-xs uppercase tracking-widest text-gray-500 font-semibold">Herramienta Etológica Profesional</span>
      </div>

      <h2 class="text-2xl font-semibold text-gray-900 mb-2 leading-tight">
        Test de Respuesta ante <span class="text-brand">Alteraciones Emocionales en Perros</span>
      </h2>
      
      <hr class="border-gray-100 mb-6">

      <div class="flex flex-col gap-3">
        <!-- Botón de Acceso -->
        <a href="https://comunidad.maestrianimal.com/test-arquetipos-perros" target="_blank" 
           class="bg-gradient-to-r from-brand to-[#006a78] hover:from-brand hover:to-brand-hover text-white font-medium py-4 px-8 rounded-full shadow-[0_8px_20px_rgba(0,80,91,0.25)] hover:shadow-[0_8px_25px_rgba(0,80,91,0.35)] transition-all duration-300 flex items-center justify-center gap-2 transform hover:-translate-y-1 w-full">
          <span>Abrir Test Etológico</span>
          <!-- Flecha sutil que se mueve en hover -->
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transition-transform duration-200 group-hover:translate-x-1">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </a>
        
        <!-- Botón de WhatsApp -->
        <button id="shareWhatsAppBtn" 
                class="bg-gradient-to-r from-whatsapp to-[#1da851] hover:from-[#20bd55] hover:to-whatsapp-hover text-white font-medium py-4 px-8 rounded-full shadow-[0_8px_20px_rgba(37,211,102,0.3)] hover:shadow-[0_8px_25px_rgba(37,211,102,0.4)] transition-all duration-300 flex items-center justify-center gap-2 transform hover:-translate-y-1 w-full">
          <!-- Icono oficial de WhatsApp -->
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
          </svg>
          Enviar al Cliente
        </button>
      </div>

    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const whatsappBtn = document.getElementById("shareWhatsAppBtn");

      whatsappBtn.addEventListener("click", function() {
        // Texto del mensaje. Usamos variables para que sea fácil de mantener.
        const patientName = "[Nombre del Paciente]"; // Opcional: podrías hacerlo dinámico en el futuro
        const message = `Hola, te comparto el enlace para la evaluación de *Arquetipos de Alteraciones Emocionales*.\n\nPor favor, complétalo antes de nuestra próxima sesión ingresando aquí:\nhttps://www.maestrianimal.com/test\n\nCualquier duda, me comentas. ¡Un saludo!`;

        const encodedMessage = encodeURIComponent(message);
        
        // WhatsApp API (Funciona tanto en Web, Desktop como en Móviles)
        const whatsappUrl = `https://api.whatsapp.com/send?text=${encodedMessage}`;

        window.open(whatsappUrl, "_blank");
      });
    });
  </script>
</body>
</html>
